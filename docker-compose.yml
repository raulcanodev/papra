services:
  papra:
    container_name: papra
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    restart: unless-stopped
    ports:
      - "1221:1221"
    environment:
      - APP_BASE_URL=${APP_BASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_IS_REGISTRATION_ENABLED=${AUTH_IS_REGISTRATION_ENABLED:-false}
      - DOCUMENT_STORAGE_DRIVER=${DOCUMENT_STORAGE_DRIVER:-filesystem}
      # Cloudflare R2 / S3 (solo si DOCUMENT_STORAGE_DRIVER=s3)
      - DOCUMENT_STORAGE_S3_ACCESS_KEY_ID=${DOCUMENT_STORAGE_S3_ACCESS_KEY_ID:-}
      - DOCUMENT_STORAGE_S3_SECRET_ACCESS_KEY=${DOCUMENT_STORAGE_S3_SECRET_ACCESS_KEY:-}
      - DOCUMENT_STORAGE_S3_BUCKET_NAME=${DOCUMENT_STORAGE_S3_BUCKET_NAME:-}
      - DOCUMENT_STORAGE_S3_REGION=${DOCUMENT_STORAGE_S3_REGION:-auto}
      - DOCUMENT_STORAGE_S3_ENDPOINT=${DOCUMENT_STORAGE_S3_ENDPOINT:-}
      # Cifrado de documentos
      - DOCUMENT_STORAGE_ENCRYPTION_IS_ENABLED=${DOCUMENT_STORAGE_ENCRYPTION_IS_ENABLED:-false}
      - DOCUMENT_STORAGE_DOCUMENT_KEY_ENCRYPTION_KEYS=${DOCUMENT_STORAGE_DOCUMENT_KEY_ENCRYPTION_KEYS:-}
      - EMAILS_DRIVER=${EMAILS_DRIVER:-logger}
      - AUTOSEND_API_KEY=${AUTOSEND_API_KEY:-}
      - EMAILS_FROM_ADDRESS=${EMAILS_FROM_ADDRESS:-}
      - AI_OPENAI_API_KEY=${AI_OPENAI_API_KEY:-}
      - AI_ANTHROPIC_API_KEY=${AI_ANTHROPIC_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
    volumes:
      - ${PAPRA_DATA_DIR:-./app-data}:/app/app-data

